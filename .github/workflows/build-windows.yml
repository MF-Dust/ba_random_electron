name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: C:\\Users\\runneradmin\\AppData\\Local\\electron-builder\\Cache
          ELECTRON_CACHE: C:\\Users\\runneradmin\\AppData\\Local\\electron\\Cache
        run: npm run build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: setup-exe
          path: dist\*.exe
          if-no-files-found: error
