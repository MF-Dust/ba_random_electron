name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (e.g. v1.2.3)
        required: true
      release_name:
        description: Release name (optional)
        required: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ci]')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Detect release mode
        id: release_mode
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $isPush = "${{ github.event_name }}" -eq "push"
          $message = if ($isPush) { "${{ github.event.head_commit.message }}" } else { "" }
          $isUnstable = $message -match "\[unstable\]"
          if ($isUnstable) {
            $tag = "preview-${{ github.run_number }}"
            $name = "Preview ${{ github.run_number }}"
            $prerelease = "true"
          } else {
            $tag = if ($isPush) { "v$version" } else { "${{ inputs.release_tag }}" }
            $name = if ($isPush) { "v$version" } else { "${{ inputs.release_name }}" }
            $prerelease = "false"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $commit = "${{ github.sha }}"
          $isPush = "${{ github.event_name }}" -eq "push"
          $message = if ($isPush) { "${{ github.event.head_commit.message }}" } else { "" }
          $type = if ($message -match "\[unstable\]") { "preview" } else { "stable" }
          
          mkdir artifacts
          
          # Generate version metadata
          $content = @"
          version: "$version"
          commit: "$commit"
          type: "$type"
          "@
          $content | Out-File -FilePath artifacts\version.yml -Encoding utf8
          
          # Copy installers
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Copy-Item -Destination "artifacts/"
          Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Copy-Item -Destination "artifacts/"
          
          # Create Portable ZIP
          $exePath = Get-ChildItem -Path "src-tauri/target/release/blue-random.exe" | Select-Object -First 1
          if ($exePath) {
            Compress-Archive -Path $exePath.FullName -DestinationPath "artifacts/blue-random-windows-portable.zip"
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: artifacts/*
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_mode.outputs.tag }}
          name: ${{ steps.release_mode.outputs.name }}
          prerelease: ${{ steps.release_mode.outputs.prerelease }}
          files: artifacts/*
