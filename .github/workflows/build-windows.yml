name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (e.g. v1.2.3)
        required: true
      release_name:
        description: Release name (optional)
        required: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: C:\\Users\\runneradmin\\AppData\\Local\\electron-builder\\Cache
          ELECTRON_CACHE: C:\\Users\\runneradmin\\AppData\\Local\\electron\\Cache
        run: npm run build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist\*.zip
          if-no-files-found: error

      - name: Publish preview release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview-${{ github.run_number }}
          name: Preview ${{ github.run_number }}
          prerelease: true
          files: dist/*.zip

      - name: Publish release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          prerelease: false
          files: dist/*.zip
