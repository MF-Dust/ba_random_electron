# 学生名单已拆分到 list.yaml；这里保留空字段用于兼容旧版本～
studentList: []
allowRepeatDraw: true

# 悬浮按钮配置～
floatingButton:
  # 按钮大小百分比（基准50px×50px），范围0-1000，默认100～
  sizePercent: 100
  # 透明度百分比，范围0-100（0=完全不透明，100=完全透明），默认20～
  transparencyPercent: 20
  # 是否置顶（true/false），默认true～
  alwaysOnTop: true
  # 悬浮按钮窗口位置（左上角屏幕坐标），退出时自动保存；null表示使用默认位置～
  position:
    x: null
    y: null

# 人数选择窗口配置～
pickCountDialog:
  # 是否默认播放点名BGM（true/false），默认false～
  defaultPlayMusic: false
  # 背景变暗程度，范围0-100（100接近全黑），默认50～
  backgroundDarknessPercent: 50
  # 每次默认点名人数，范围1-10的整数，默认1～
  defaultCount: 1

# 点名结果动画音效配置～
pickResultDialog:
  # 是否默认播放点名音效（true/false），默认true～
  defaultPlayGachaSound: true
  # 点名音效音量（0.0-1.0），默认0.6～
  gachaSoundVolume: 0.6

# 应用配置～
webConfig:
  # 兼容旧版本字段；Tauri版不再启动本地Web配置服务～
  port: 21219
  # 启用管理员置顶增强（Windows下会尝试管理员权限）～
  adminTopmostEnabled: false
  # 是否创建开机计划任务（管理员权限运行）～
  adminAutoStartEnabled: false
  # 开机任务运行的可执行文件路径～
  adminAutoStartPath: ""
  # 开机任务名称～
  adminAutoStartTaskName: "KVRandom (Admin)"
