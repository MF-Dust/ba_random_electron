<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BA 配置中心</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>BA 配置中心</h1>
        <p class="hint">保存后将写入 config.yml，系统会询问是否立即重启应用。</p>

        <form id="config-form">
          <h2>悬浮按钮</h2>
          <label>
            按钮大小（0-1000）
            <input type="number" id="fb-size" min="0" max="1000" required />
          </label>
          <label>
            透明度（0-100）
            <input type="number" id="fb-transparency" min="0" max="100" required />
          </label>
          <label class="inline">
            <input type="checkbox" id="fb-top" />
            是否置顶
          </label>
          <div class="row">
            <label>
              位置 X（可留空）
              <input type="number" id="fb-pos-x" />
            </label>
            <label>
              位置 Y（可留空）
              <input type="number" id="fb-pos-y" />
            </label>
          </div>

          <h2>人数选择窗口</h2>
          <label class="inline">
            <input type="checkbox" id="pick-music" />
            默认播放音乐
          </label>
          <label>
            背景变暗程度（0-100）
            <input type="number" id="pick-dark" min="0" max="100" required />
          </label>
          <label>
            默认人数（1-10）
            <input type="number" id="pick-count" min="1" max="10" required />
          </label>

          <h2>网页配置服务</h2>
          <label>
            端口（1-65535）
            <input type="number" id="web-port" min="1" max="65535" required />
          </label>

          <button type="submit" class="save-btn">保存配置</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
